<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Note Identification Game</title>
    <style>
        :root {
            --mint: #B2F2BB;
            --pink: #FFD6E0;
            --blue: #A2D2FF;
            --yellow: #FEF9E7;
            --text: #5B5B5B;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(180deg, #E3F2FD 0%, #F3E5F5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            padding: 10px;
            box-sizing: border-box;
        }

        #game-container {
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 0px #CBD5E0, 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            position: relative;
            text-align: center;
            border: 6px solid white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-board, .timer-box {
            background: var(--yellow);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid #FAD7A0;
            flex: 1;
            min-width: 100px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #FF85A1;
            width: 100%;
            order: -1;
        }

        canvas {
            width: 100%;
            height: auto;
            max-height: 260px;
            background: white;
            border-radius: 15px;
            margin: 10px 0;
            touch-action: none;
        }

        #piano-wrapper {
            width: 100%;
            overflow-x: auto;
            background: #F7FAFC;
            border-radius: 20px;
            padding: 10px 0;
            -webkit-overflow-scrolling: touch;
        }

        #piano {
            display: inline-flex;
            justify-content: center;
            height: 160px;
            padding: 10px 20px;
            position: relative;
        }

        .key {
            width: 40px;
            height: 100%;
            background: white;
            border: 1px solid #D1D5DB;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            z-index: 1;
            flex-shrink: 0;
            transition: all 0.1s;
            box-shadow: 0 4px 0 #E2E8F0;
        }

        .key.black {
            width: 28px;
            height: 100px;
            background: #4A5568;
            margin: 0 -14px;
            z-index: 2;
            border: none;
            box-shadow: 0 4px 0 #2D3748;
        }

        .key:active { transform: translateY(4px); box-shadow: none; background: #FFEBEE; }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }

        .input-group {
            background: var(--pink);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            width: 90%;
            max-width: 300px;
        }

        input {
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid white;
            width: 80%;
            text-align: center;
        }

        .btn-fancy {
            background: #FF85A1;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 0 #D6336C;
            font-weight: bold;
            margin: 5px;
        }

        .btn-fancy.secondary { background: var(--blue); box-shadow: 0 5px 0 #5DA9EE; }

        .leaderboard {
            width: 90%;
            max-width: 400px;
            background: var(--mint);
            padding: 15px;
            border-radius: 20px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        #feedback-text {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 900;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            .score-board, .timer-box { font-size: 1rem; }
            #piano { height: 140px; }
            .key { width: 35px; }
            .key.black { width: 24px; margin: 0 -12px; height: 85px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <h1>Note Identification Game</h1>
        <div class="score-board">⭐ SCORE: <span id="score">0</span></div>
        <div class="timer-box" id="timer">01:00</div>
    </div>

    <canvas id="staffCanvas" width="1000" height="280"></canvas>
    <div id="feedback-text"></div>

    <div id="piano-wrapper">
        <div id="piano"></div>
    </div>

    <div id="overlay">
        <div id="start-view">
            <h2 style="color: #5B5B5B;">Welcome! 🍭</h2>
            <button class="btn-fancy" onclick="startGame()">START GAME 🚀</button>
            <br>
            <button class="btn-fancy secondary" onclick="showLeaderboardView()">View Leaderboard 🏆</button>
        </div>

        <div id="input-view" style="display: none;">
            <h2 style="color: #FF85A1; margin-top: 0;">Time's Up! 🍦</h2>
            <div class="input-group">
                <p style="margin: 0 0 10px 0;">Enter your name:</p>
                <input type="text" id="playerName" placeholder="Your Name" maxlength="12">
            </div>
            <button class="btn-fancy" onclick="submitScore()">SUBMIT & SEE RANK</button>
        </div>

        <div id="stats-view" style="display: none;">
            <div id="last-result" style="font-weight: bold; margin-bottom: 10px;"></div>
            <div class="leaderboard">
                <h3 style="margin: 0 0 10px 0;">🏆 High Scores</h3>
                <div id="highScoresList"></div>
            </div>
            <button class="btn-fancy" onclick="resetUI()">Back to Menu</button>
            <button class="btn-fancy secondary" onclick="startGame()">Play Again! 🚀</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('staffCanvas');
    const ctx = canvas.getContext('2d');
    const pianoContainer = document.getElementById('piano');
    const feedbackText = document.getElementById('feedback-text');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let targetNote = "";
    let noteColor = "#5B5B5B";
    let timerId;

    const s = 24; 
    const centerY = canvas.height / 2; 

    const noteMap = {
        "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, "B4": 0,
        "C5": 1,  "D5": 2,  "E5": 3,  "F5": 4,  "G5": 5,  "A5": 6,  "B5": 7, "C6": 8
    };

    const pianoLayout = [
        "C4","C#4","D4","D#4","E4","F4","F#4","G4","G#4","A4","A#4","B4",
        "C5","C#5","D5","D#5","E5","F5","F#5","G5","G#5","A5","A#5","B5","C6"
    ];

    function drawStaff() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#D1D5DB";
        ctx.lineWidth = 2.5;

        // 五線譜
        for (let i = -2; i <= 2; i++) {
            let y = centerY + (i * s);
            ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(950, y); ctx.stroke();
        }

        // --- 高音譜號修正 (V10) ---
        ctx.save();
        ctx.fillStyle = "#5B5B5B";
        
        ctx.font = `${s * 10.546875}px Arial`;
        ctx.textBaseline = "middle";
        
        // 移高 6px：原 V9 坐標是 centerY - s * 0.2。
        // 移高 6px 代表 Y 軸減去 6。因為 s=24，6px 剛好是 0.25s。
        // 新坐標 = (centerY - s * 0.2) - s * 0.25 = centerY - s * 0.45
        ctx.translate(80, centerY - s * 0.45); 
        ctx.scale(0.85, 1); // 保持纖細形態
        ctx.fillText("𝄞", 0, 0); 
        ctx.restore();

        if (targetNote) renderNote();
    }

    function renderNote() {
        const steps = noteMap[targetNote];
        const y = centerY - (steps * (s / 2));
        const x = canvas.width / 2 + 50;

        ctx.strokeStyle = noteColor;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(x, y, s * 0.75, s * 0.6, -Math.PI / 8, 0, 2 * Math.PI);
        ctx.stroke();

        if (steps <= -6) { ctx.beginPath(); ctx.moveTo(x-30, centerY+s*3); ctx.lineTo(x+30, centerY+s*3); ctx.stroke(); }
        if (steps >= 6) { ctx.beginPath(); ctx.moveTo(x-30, centerY-s*3); ctx.lineTo(x+30, centerY-s*3); ctx.stroke(); }
        if (steps >= 8) { ctx.beginPath(); ctx.moveTo(x-30, centerY-s*4); ctx.lineTo(x+30, centerY-s*4); ctx.stroke(); }
    }

    function initPiano() {
        pianoLayout.forEach(note => {
            const div = document.createElement('div');
            div.className = `key ${note.includes("#") ? 'black' : ''}`;
            div.dataset.note = note;
            div.onclick = () => handleInput(note);
            pianoContainer.appendChild(div);
        });
    }

    function handleInput(note) {
        if (!gameActive) return;
        if (note === targetNote) {
            noteColor = "#5B5B5B"; score += 10;
            document.getElementById('score').innerText = score;
            showFeedback("🌈 GREAT!", "#4CAF50");
            next();
        } else {
            noteColor = "#FF5252"; showFeedback("Oops! 🍎", "#FF5252");
            drawStaff();
        }
    }

    function showFeedback(text, color) {
        feedbackText.innerText = text; feedbackText.style.color = color;
        feedbackText.style.display = 'block';
        setTimeout(() => feedbackText.style.display = 'none', 600);
    }

    function next() {
        const keys = Object.keys(noteMap);
        let newNote;
        do { newNote = keys[Math.floor(Math.random() * keys.length)]; } while (newNote === targetNote);
        targetNote = newNote; noteColor = "#5B5B5B"; drawStaff();
    }

    function startGame() {
        score = 0; timeLeft = 60; gameActive = true;
        document.getElementById('score').innerText = "0";
        document.getElementById('overlay').style.display = 'none';
        timerId = setInterval(() => {
            timeLeft--;
            let m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let sec = String(timeLeft % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${sec}`;
            if (timeLeft <= 0) endGame();
        }, 1000);
        next();
    }

    function endGame() {
        gameActive = false; clearInterval(timerId);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('start-view').style.display = 'none';
        document.getElementById('stats-view').style.display = 'none';
        document.getElementById('input-view').style.display = 'block';
    }

    function submitScore() {
        const name = document.getElementById('playerName').value.trim() || "Musician";
        const newRecord = { name: name, score: score, date: new Date().toLocaleDateString() };
        let records = JSON.parse(localStorage.getItem('noteRecordsV7') || "[]");
        records.push(newRecord);
        records.sort((a, b) => b.score - a.score);
        records = records.slice(0, 10);
        localStorage.setItem('noteRecordsV7', JSON.stringify(records));
        
        document.getElementById('last-result').innerText = `Player: ${name} | Score: ${score} pts`;
        showLeaderboardView();
    }

    function showLeaderboardView() {
        document.getElementById('start-view').style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('stats-view').style.display = 'block';
        displayHighScores();
    }

    function displayHighScores() {
        const records = JSON.parse(localStorage.getItem('noteRecordsV7') || "[]");
        const listArea = document.getElementById('highScoresList');
        if (records.length === 0) { listArea.innerHTML = "<p>No records yet!</p>"; return; }
        let html = "<table style='width:100%; border-spacing: 0 8px;'>";
        records.forEach((r, idx) => {
            html += `<tr><td>#${idx+1} ${r.name}</td><td style='text-align:right; font-weight:bold;'>${r.score}</td></tr>`;
        });
        listArea.innerHTML = html + "</table>";
    }

    function resetUI() {
        document.getElementById('playerName').value = "";
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('start-view').style.display = 'block';
        document.getElementById('stats-view').style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('last-result').innerText = "";
    }

    window.onload = () => { initPiano(); drawStaff(); resetUI(); };
</script>

</body>
</html>
