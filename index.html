<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMS Note ID Game - Precision Ed.</title>
    <style>
        :root {
            --primary: #FF5252;
            --success: #4CAF50;
            --info: #2196F3;
            --accent: #9C27B0;
            --bg-gradient: linear-gradient(135deg, #e0f7fa 0%, #fce4ec 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 1000px;
            position: relative;
            border: 8px solid white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-board {
            background: #fff;
            padding: 10px 25px;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-size: 1.5rem;
            font-weight: 900;
            color: #333;
        }

        .timer-box {
            background: #333;
            color: #FFEB3B;
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-family: 'Courier New', monospace;
        }

        canvas {
            width: 100%;
            height: 260px; /* 增加高度以容納更大的譜號 */
            background: #fff;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        #piano {
            display: flex;
            justify-content: center;
            height: 220px;
            position: relative;
            padding: 10px;
            background: #2c3e50;
            border-radius: 15px;
            box-shadow: 0 10px 0 #1a252f;
        }

        .key {
            width: 48px;
            height: 100%;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            z-index: 1;
            transition: transform 0.1s;
        }

        .key.black {
            width: 32px;
            height: 130px;
            background: linear-gradient(#444, #000);
            margin: 0 -16px;
            z-index: 2;
            border: none;
        }

        .key:active { background: #ffe082; transform: translateY(5px); }
        .key.black:active { background: #000; }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            border-radius: 25px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .btn-start {
            background: #FF5252;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 0 #D32F2F;
            font-weight: bold;
        }

        .btn-start:active { transform: translateY(5px); box-shadow: 0 5px 0 #D32F2F; }

        #feedback-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="score-board">SCORE: <span id="score">0</span></div>
        <h1 style="color:var(--info); margin:0;">CMS Note Game</h1>
        <div class="timer-box" id="timer">01:00</div>
    </div>

    <canvas id="staffCanvas" width="1000" height="260"></canvas>
    <div id="feedback-text"></div>

    <div id="piano"></div>

    <div id="overlay">
        <h1 id="result-title">Ready to Start?</h1>
        <p id="final-score" style="font-size:1.5rem;"></p>
        <button class="btn-start" onclick="startGame()">START GAME</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('staffCanvas');
    const ctx = canvas.getContext('2d');
    const pianoContainer = document.getElementById('piano');
    const feedbackText = document.getElementById('feedback-text');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let targetNote = "";
    let noteColor = "#000"; // 遊戲開始前，音符預設為黑色
    let timerId;

    const s = 24; 
    const centerY = canvas.height / 2; 

    const noteMap = {
        "C4": -6, "D4": -5, "E4": -4, "F4": -3, "G4": -2, "A4": -1, "B4": 0,
        "C5": 1,  "D5": 2,  "E5": 3,  "F5": 4,  "G5": 5,  "A5": 6,  "B5": 7, "C6": 8
    };

    const pianoLayout = [
        "C4","C#4","D4","D#4","E4","F4","F#4","G4","G#4","A4","A#4","B4",
        "C5","C#5","D5","D#5","E5","F5","F#5","G5","G#5","A5","A#5","B5","C6"
    ];

    function drawStaff() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 2;
        for (let i = -2; i <= 2; i++) {
            let y = centerY + (i * s);
            ctx.beginPath(); ctx.moveTo(50, y); ctx.lineTo(950, y); ctx.stroke();
        }

        // 修改 2: 根據附圖紅色高音譜號大跨度和位置，並精密對齊
        ctx.font = `${s * 9}px Arial`; 
        ctx.fillStyle = "#000";
        // 精密 Y 軸對齊。螺旋中心在第二線 $G_4$。這條線的 Y 是 `centerY + s`。
        // 使用 `middle` 基線並精密微調。Arial 字體中，`s * 1.5` 左右的偏移量能使螺旋中心對齊第二線。
        ctx.textBaseline = "middle"; 
        ctx.fillText("𝄞", 70, centerY + s * 1.5); 

        if (targetNote) renderNote();
    }

    function renderNote() {
        // 修改 1: 移除符桿，將所有音符改為全音符橢圓
        const steps = noteMap[targetNote];
        const y = centerY - (steps * (s / 2));
        const x = canvas.width / 2 + 50;

        ctx.fillStyle = noteColor;
        ctx.strokeStyle = noteColor;

        // 全音符符頭橢圓
        ctx.beginPath();
        ctx.ellipse(x, y, s * 0.7, s * 0.55, Math.PI / 8, 0, 2 * Math.PI);
        ctx.fill();

        // 保留加線，只畫橫線，無符桿
        if (steps <= -6) { ctx.beginPath(); ctx.moveTo(x-25, centerY+s*3); ctx.lineTo(x+25, centerY+s*3); ctx.stroke(); }
        if (steps >= 6) { ctx.beginPath(); ctx.moveTo(x-25, centerY-s*3); ctx.lineTo(x+25, centerY-s*3); ctx.stroke(); }
        if (steps >= 8) { ctx.beginPath(); ctx.moveTo(x-25, centerY-s*4); ctx.lineTo(x+25, centerY-s*4); ctx.stroke(); }
    }

    function initPiano() {
        pianoLayout.forEach(note => {
            const div = document.createElement('div');
            div.className = `key ${note.includes("#") ? 'black' : ''}`;
            div.onclick = () => handleInput(note);
            pianoContainer.appendChild(div);
        });
    }

    function handleInput(note) {
        if (!gameActive) return;
        if (note === targetNote) {
            // 修改 3a: 在答對的分支中，確保顏色立即重置為黑色。
            noteColor = "#000"; 
            score += 10;
            document.getElementById('score').innerText = score;
            showFeedback("CORRECT!", "#4CAF50");
            next(); // 生成下一個
        } else {
            // 答錯，變紅並重繪
            noteColor = "#FF5252"; 
            showFeedback("ERROR!", "#FF5252");
            drawStaff();
        }
    }

    function showFeedback(text, color) {
        feedbackText.innerText = text;
        feedbackText.style.color = color;
        feedbackText.style.display = 'block';
        setTimeout(() => feedbackText.style.display = 'none', 500);
    }

    function next() {
        const keys = Object.keys(noteMap);
        targetNote = keys[Math.floor(Math.random() * keys.length)];
        // 修改 3b: 生成新音符前，再次確保音符顏色重置為黑色。這可以防止上一個答錯的紅色影響下一個。
        noteColor = "#000"; 
        drawStaff(); 
    }

    function startGame() {
        score = 0;
        timeLeft = 60;
        gameActive = true;
        document.getElementById('score').innerText = "0";
        document.getElementById('overlay').style.display = 'none';
        
        timerId = setInterval(() => {
            timeLeft--;
            let m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let s = String(timeLeft % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            if (timeLeft <= 0) endGame();
        }, 1000);
        
        next();
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerId);
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('result-title').innerText = "TIME'S UP!";
        document.getElementById('final-score').innerText = `Your Final Score: ${score}`;
        document.querySelector('.btn-start').innerText = "RETRY";
    }

    window.onload = () => {
        initPiano();
        document.getElementById('overlay').style.display = 'flex';
        drawStaff();
    };
</script>

</body>
</html>
